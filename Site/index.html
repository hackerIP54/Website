<!DOCTYPE html>
<html lang="de">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Main Site</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1> Roblox Creator Main Site</h1>
  <button id="refreshBtn">🔄 Refresh</button>
</header>

<main class="container">

  <section class="grid">

    <div class="card big">
      <h2>Followers</h2>
      <div id="followers">Loading...</div>
      <p>Status: Live</p>
    </div>

  </section>

  <section class="info">
    <h3>Account Info</h3>
    <p><b>User ID:</b> <span id="userId">-</span></p>
    <p><b>Username:</b> <span id="username">Loading...</span></p>
    <p><b>Display Name:</b> <span id="displayName">Loading...</span></p>
  </section>

</main>

<footer class="footer">
  <p>© 2026 Bombblingm. All Rights Reserved.</p>
  <p>Support: support@bombblingmrbx.abrdns.com</p>
</footer>

</html>
