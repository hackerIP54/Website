<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Main Site</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1>🎮 Creator Main Site</h1>
  <button id="refresh">Refresh</button>
</header>

<section class="hero">

  <div class="card big">
    <h2>Live Followers</h2>
    <div id="followers">0</div>
    <p id="status">Updating...</p>
  </div>

  <div class="card">
    <h3>Visits</h3>
    <div id="visits">0</div>
  </div>

  <div class="card">
    <h3>Players</h3>
    <div id="players">0</div>
  </div>

</section>

<section class="log">
  <h3>Live Feed</h3>
  <div id="feed"></div>
</section>

<script src="script.js"></script>
</body>
</html>
