<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Support</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
    background:#f5f5f5;
}

.container{
    background:white;
    padding:30px;
    max-width:500px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.warning{
    color:#d9534f;
    font-weight:bold;
    display:none;
    margin-top:15px;
}

.hidden-ad{
    height:1px;
    width:1px;
    position:absolute;
    left:-9999px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Contact Support</h1>

    <p>
        Your email application will be opened on your device.
    </p>

    <button id="openMail">
        Open Email App
    </button>

    <div id="adblockWarning" class="warning">
        Ad Blocker Detected. Please disable your ad blocker and reload the page.
    </div>
</div>

<div class="hidden-ad adsbox"></div>

<script>
window.addEventListener("load", function () {

    // Simple adblock detection
    setTimeout(() => {
        const ad = document.querySelector(".adsbox");

        if (!ad || ad.offsetHeight === 0) {
            document.getElementById("adblockWarning").style.display = "block";
        }
    }, 100);

    document.getElementById("openMail").addEventListener("click", () => {
        window.location.href =
            "mailto:support@bombblingmrbx.abrdns.com";
    });

});
</script>

</body>
</html>
